<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#070707" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LH Budget" />
  <title>LH Budget</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <section id="loginView" class="login-view">
      <div class="login-card">
        <div class="lh-logo login-lh-logo" aria-label="LH Budget">
  <svg viewBox="0 0 180 112" role="img">
    <defs>
      <linearGradient id="lhGold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffe08a"/>
        <stop offset="52%" stop-color="#d9b765"/>
        <stop offset="100%" stop-color="#a67d2e"/>
      </linearGradient>
    </defs>
    <text x="47" y="66" class="lh-l">L</text>
    <text x="82" y="78" class="lh-h">H</text>
    <text x="90" y="104" class="lh-budget">LH BUDGET</text>
  </svg>
</div>
        <form id="loginForm" class="login-form">
          <input id="email" type="email" autocomplete="username" placeholder="Brugernavn / email" required />
          <input id="password" type="password" autocomplete="current-password" placeholder="Kode" required />
          <button type="submit">Log ind</button>
          <div id="loginError" class="error"></div>
        </form>
      </div>
      <div class="version">v4.3</div>
    </section>

    <section id="budgetView" class="budget-view hidden">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn">☰</button>
        <div class="top-logo"><div class="lh-logo top-lh-logo" aria-label="LH Budget">
  <svg viewBox="0 0 180 112" role="img">
    <defs>
      <linearGradient id="lhGold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffe08a"/>
        <stop offset="52%" stop-color="#d9b765"/>
        <stop offset="100%" stop-color="#a67d2e"/>
      </linearGradient>
    </defs>
    <text x="47" y="66" class="lh-l">L</text>
    <text x="82" y="78" class="lh-h">H</text>
    <text x="90" y="104" class="lh-budget">LH BUDGET</text>
  </svg>
</div></div>
        <button id="logoutBtn" class="icon-btn">⎋</button>
      </header>

      <main class="screen">
        <div class="year-row">
          <span>ÅR</span>
          <select id="yearSelect"></select>
        </div>
        <div class="months-row">
          <button id="prevMonth" class="month-arrow">‹</button>
          <div id="monthTabs" class="month-tabs"></div>
          <button id="nextMonth" class="month-arrow">›</button>
        </div>

        <section class="panel income-panel">
          <div class="panel-title">INDTÆGTER</div>
          <div class="fixed-lines">
            <div class="line editable"><span>Løn</span><input id="salaryInput" inputmode="text" /></div>
            <div class="line editable"><span id="openingLabel">Lønkonto</span><input id="openingInput" inputmode="text" /></div>
          </div>
          <div id="incomeList" class="scroll-list compact"></div>
          <div class="action-row"><button id="addIncome" class="add-btn">+ Tilføj</button><button id="transferIncome" class="add-btn">Overfør</button></div>
          <div class="total positive"><span>I ALT</span><strong id="incomeTotal">0</strong></div>
        </section>

        <section class="panel balance-panel">
          <div class="panel-title">LØNKONTO MINUS UDGIFTER</div>
          <div class="fixed-lines">
            <div class="line"><span>Indtægter</span><strong id="balanceIncome">0</strong></div>
            <div class="line negative"><span>Udgifter</span><strong id="balanceExpense">0</strong></div>
          </div>
          <div id="adjustmentList" class="scroll-list compact"></div>
          <div class="action-row"><button id="addAdjustment" class="add-btn">+ Tilføj</button><button id="transferAdjustment" class="add-btn">Overfør</button></div>
          <div class="total final"><span>I ALT</span><strong id="balanceTotal">0</strong></div>
        </section>

        <section class="panel expense-panel">
          <div class="panel-title">UDGIFTER</div>
          <div id="expenseList" class="scroll-list expenses"></div>
          <div class="action-row"><button id="addExpense" class="add-btn">+ Tilføj</button><button id="transferExpense" class="add-btn">Overfør</button></div>
          <div class="total final"><span>I ALT</span><strong id="expenseTotal">0</strong></div>
        </section>
      </main>

      <footer class="bottom hidden">
        <div class="saldo">
          <span id="saldoLabel">SALDO VED UDGANG</span>
          <strong id="saldoValue">0</strong>
        </div>
      </footer>
      <div class="version app-version">v4.3</div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
